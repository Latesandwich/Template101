<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marazzo Shop - Login</title>
    <link href='https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blue.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="cnt-home">
    <header class="header">
        <div class="container">
            <div class="row" style="display: flex; align-items: center;">
                <div class="col-xs-6 col-sm-4 logo">
                    <a href="index.html"><img src="assets/images/logo.png" alt="logo"></a>
                </div>
                <div class="col-xs-6 col-sm-8 text-right">
                    <nav>
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="cart.html" class="nav-link">
                            <i class="fa fa-shopping-cart"></i> Cart
                            <span id="cart-count" class="cart-count-badge">0</span>
                        </a>
                        <a href="login.html" class="nav-link">Login</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-md-4 col-md-offset-4 login-container">
                <h2 class="login-title">Sign In</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox"> Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                    <div class="m-t-20 text-center">
                        <a href="#">Forgot password?</a>
                        <p style="margin-top: 15px;">Don't have an account? <a href="register.html">Sign up</a></p>
                    </div>
                </form>
                <div id="login-error" style="display:none;" class="text-center">
                    <p id="login-error-message" class="alert alert-danger"></p>
                </div>
                <div id="login-success" style="display:none;" class="text-center">
                    <p class="alert alert-success">Login successful! Redirecting...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.length;
            const badge = $('#cart-count');
            if (count > 0) {
                badge.text(count).show();
            } else {
                badge.hide();
            }
        }

        $(document).ready(function() {
            updateCartCount();
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                const email = $('#email').val();
                const password = $('#password').val();

                const apiUrl = window.location.protocol === 'file:' ? 'http://localhost:3000/api/login' : '/api/login';

                $('#login-error').hide();
                $('#login-error-message').text('');

                $.ajax({
                    url: apiUrl,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, password }),
                    success: function(response) {
                        if (response.token) {
                            localStorage.setItem('authToken', response.token);
                            
                            $('#login-form').fadeOut(function() {
                                $('#login-success').fadeIn();
                                setTimeout(function() {
                                    window.location.href = 'index.html';
                                }, 1500);
                            });
                        }
                    },
                    error: function(xhr) {
                        let message = 'Login failed';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            message = xhr.responseJSON.message;
                        } else if (xhr.responseText) {
                            message = xhr.responseText;
                        }
                        $('#login-error-message').text(message);
                        $('#login-error').show();
                    }
                });
            });
        });
    </script>
</body>
</html>
