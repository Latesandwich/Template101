<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marazzo Shop - Home</title>
    <link href='https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blue.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/rateit.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="cnt-home">
    <header class="header">
        <div class="container">
            <div class="row" style="display: flex; align-items: center;">
                <div class="col-xs-6 col-sm-4 logo">
                    <a href="index.html"><img src="assets/images/logo.png" alt="logo"></a>
                </div>
                <div class="col-xs-6 col-sm-8 text-right">
                    <nav>
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="cart.html" class="nav-link">
                            <i class="fa fa-shopping-cart"></i> Cart
                            <span id="cart-count" class="cart-count-badge">0</span>
                        </a>
                        <a href="login.html" class="nav-link">Login</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="body-content">
        <div class="container">
            <div class="row">
                <div class="col-xs-12">
                    <h2 class="section-title">Featured Products</h2>
                    <div id="product-container" class="row">
                        <!-- Products will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-toast">Item added to cart!</div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/jquery.rateit.min.js"></script>
    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.length;
            const badge = $('#cart-count');
            if (count > 0) {
                badge.text(count).show();
            } else {
                badge.hide();
            }
        }

        function showToast(message) {
            const toast = $('#cart-toast');
            toast.text(message);
            toast.addClass('show');
            setTimeout(() => {
                toast.removeClass('show');
            }, 3000);
        }

        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                product.quantity = 1;
                cart.push(product);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(product.name + ' added to cart!');
        }

        $(document).ready(function() {
            updateCartCount();
            $.getJSON('data/products.json', function(products) {
                const container = $('#product-container');
                products.forEach(product => {
                    const productHtml = `
                        <div class="col-sm-6 col-md-4 col-lg-3">
                            <div class="product-card">
                                <div class="product-image">
                                    <a href="product-details.html?id=${product.id}">
                                        <img src="${product.image}" alt="${product.name}">
                                    </a>
                                </div>
                                <div class="product-info">
                                    <a href="product-details.html?id=${product.id}" class="product-name">${product.name}</a>
                                    <div class="rating">
                                        <div class="rateit" data-rateit-value="${product.rating}" data-rateit-ispreset="true" data-rateit-readonly="true"></div>
                                    </div>
                                    <div class="product-price">${product.price}</div>
                                    <div class="action m-t-10">
                                        <button class="btn btn-primary" type="button" onclick='addToCart(${JSON.stringify(product)})'>Add to Cart</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.append(productHtml);
                });
                $('.rateit').rateit();
            }).fail(function() {
                console.error("Error loading products.json.");
                $('#product-container').html('<div class="col-xs-12"><p class="alert alert-warning">Error loading products. Please use a local server.</p></div>');
            });
        });
    </script>
</body>
</html>
