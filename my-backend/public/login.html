<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marazzo Shop - Login</title>
    <link href='https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blue.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="cnt-home">
    <header class="header">
        <div class="container">
            <div class="row" style="display: flex; align-items: center;">
                <div class="col-xs-6 col-sm-4 logo">
                    <a href="index.html"><img src="assets/images/logo.png" alt="logo"></a>
                </div>
                <div class="col-xs-6 col-sm-8 text-right">
                    <nav>
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="cart.html" class="nav-link">
                            <i class="fa fa-shopping-cart"></i> Cart
                            <span id="cart-count" class="cart-count-badge">0</span>
                        </a>
                        <a href="login.html" class="nav-link">Login</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-md-4 col-md-offset-4 login-container">
                <h2 class="login-title">Sign In</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" value="user@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" value="password123" required>
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox"> Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                    <div class="m-t-20 text-center">
                        <a href="#">Forgot password?</a>
                    </div>
                </form>
                <div id="login-success" style="display:none;" class="text-center">
                    <p class="alert alert-success">Login successful! Redirecting...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.length;
            const badge = $('#cart-count');
            if (count > 0) {
                badge.text(count).show();
            } else {
                badge.hide();
            }
        }

        $(document).ready(function() {
            updateCartCount();
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                $(this).fadeOut(function() {
                    $('#login-success').fadeIn();
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1500);
                });
            });
        });
    </script>
</body>
</html>
