<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marazzo Shop - Shopping Cart</title>
    <link href='https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blue.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="cnt-home">
    <header class="header">
        <div class="container">
            <div class="row" style="display: flex; align-items: center;">
                <div class="col-xs-6 col-sm-4 logo">
                    <a href="index.html"><img src="assets/images/logo.png" alt="logo"></a>
                </div>
                <div class="col-xs-6 col-sm-8 text-right">
                    <nav>
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="cart.html" class="nav-link">
                            <i class="fa fa-shopping-cart"></i> Cart
                            <span id="cart-count" class="cart-count-badge">0</span>
                        </a>
                        <a href="login.html" class="nav-link">Login</a>
                        <a href="register.html" class="nav-link">Register</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="body-content">
        <div class="container">
            <div class="cart-container">
                <h2 class="section-title">My Shopping Cart</h2>
                <div class="table-responsive">
                    <table class="table cart-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Subtotal</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items">
                            <!-- Cart items will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <div id="empty-cart-msg" style="display:none;" class="text-center p-40">
                    <h3>Your cart is empty</h3>
                    <a href="index.html" class="btn btn-primary m-t-20">Continue Shopping</a>
                </div>

                <div id="cart-summary" class="row">
                    <div class="col-md-4 col-md-offset-8">
                        <div class="cart-total-section text-right">
                            <p>Grand Total: <span class="total-price" id="cart-grand-total">$0.00</span></p>
                            <button class="btn btn-primary btn-lg btn-block" onclick="alert('Proceeding to checkout...')">Checkout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.length;
            const badge = $('#cart-count');
            if (count > 0) {
                badge.text(count).show();
            } else {
                badge.hide();
            }
        }

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = $('#cart-items');
            const summary = $('#cart-summary');
            const emptyMsg = $('#empty-cart-msg');
            
            container.empty();
            let grandTotal = 0;

            if (cart.length === 0) {
                summary.hide();
                emptyMsg.show();
                $('.cart-table').hide();
                return;
            }

            summary.show();
            emptyMsg.hide();
            $('.cart-table').show();

            cart.forEach((item, index) => {
                const priceString = String(item.price);
                const price = parseFloat(priceString.replace('$', ''));
                const subtotal = price * item.quantity;
                grandTotal += subtotal;

                container.append(`
                    <tr>
                        <td><img src="${item.image}" alt="${item.name}"></td>
                        <td><a href="product-details.html?id=${item.id}">${item.name}</a></td>
                        <td>${item.price}</td>
                        <td>
                            <input type="number" class="form-control" value="${item.quantity}" min="1" style="width: 70px;" onchange="updateQuantity(${index}, this.value)">
                        </td>
                        <td>$${subtotal.toFixed(2)}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="removeItem(${index})"><i class="fa fa-trash"></i></button>
                        </td>
                    </tr>
                `);
            });

            $('#cart-grand-total').text('$' + grandTotal.toFixed(2));
        }

        function updateQuantity(index, newQty) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart[index].quantity = parseInt(newQty);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
            updateCartCount();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
            updateCartCount();
        }

        $(document).ready(function() {
            loadCart();
            updateCartCount();
        });
    </script>
</body>
</html>
