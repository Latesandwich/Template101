<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marazzo Shop - Home</title>
    <link
      href="https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/blue.css" />
    <link rel="stylesheet" href="assets/css/font-awesome.css" />
    <link rel="stylesheet" href="assets/css/rateit.css" />
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="cnt-home">
    <header class="header">
      <div class="container">
        <div class="row" style="display: flex; align-items: center">
          <div class="col-xs-6 col-sm-4 logo">
            <a href="index.html"
              ><img src="assets/images/logo.png" alt="logo"
            /></a>
          </div>
          <div class="col-xs-6 col-sm-8 text-right">
            <nav>
              <a href="index.html" class="nav-link">Home</a>
              <a href="cart.html" class="nav-link">
                <i class="fa fa-shopping-cart"></i> Cart
                <span id="cart-count" class="cart-count-badge">0</span>
              </a>
              <a href="login.html" class="nav-link">Login</a>
              <a href="register.html" class="nav-link">Register</a>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <div class="body-content">
      <div class="container">
        <div class="row">
          <div class="col-xs-12">
            <h2 class="section-title" id="main-title">Featured Products</h2>
            <div id="product-container" class="row">
              <!-- Products will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="cart-toast">Item added to cart!</div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/jquery.rateit.min.js"></script>
    <script>
      function updateCartCount() {
          const cart = JSON.parse(localStorage.getItem('cart')) || [];
          const count = cart.length;
          const badge = $('#cart-count');
          if (count > 0) {
              badge.text(count).show();
          } else {
              badge.hide();
          }
      }

      function showToast(message) {
          const toast = $('#cart-toast');
          toast.text(message);
          toast.addClass('show');
          setTimeout(() => {
              toast.removeClass('show');
          }, 3000);
      }

      function addToCart(product) {
          let cart = JSON.parse(localStorage.getItem('cart')) || [];
          const existing = cart.find(item => item.id === product.id);
          if (existing) {
              existing.quantity += 1;
          } else {
              product.quantity = 1;
              cart.push(product);
          }
          localStorage.setItem('cart', JSON.stringify(cart));
          updateCartCount();
          showToast(product.name + ' added to cart!');
      }

      function renderProducts(products) {
          const container = $('#product-container');
          container.empty();

          if (products.length === 0) {
              container.append('<div class="col-xs-12"><p class="alert alert-info">No products found in this category.</p></div>');
              return;
          }

          products.forEach(product => {
              const productHtml = `
                  <div class="col-sm-6 col-md-4 col-lg-3">
                      <div class="product-card">
                          <div class="product-image">
                              <a href="product-details.html?id=${product.id}">
                                  <img src="${product.image}" alt="${product.name}">
                              </a>
                          </div>
                          <div class="product-info">
                              <a href="product-details.html?id=${product.id}" class="product-name">${product.name}</a>
                              <div class="rating">
                                  <div class="rateit" data-rateit-value="${product.rating}" data-rateit-ispreset="true" data-rateit-readonly="true"></div>
                              </div>
                              <div class="product-price">${product.price}</div>
                              <div class="action m-t-10">
                                  <button class="btn btn-primary" type="button" onclick='addToCart(${JSON.stringify(product)})'>Add to Cart</button>
                              </div>
                          </div>
                      </div>
                  </div>
              `;
              container.append(productHtml);
          });
          $('.rateit').rateit();
      }

      async function filterByCategory(category) {
          // 2. Request: The Browser sends a specific "envelope" to the Server
          try {
              const response = await fetch('/api/products/filter', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ category }) // The Envelope
              });

              // 4. Response: The Server sends back a "Package" and a "Status"
              const result = await response.json();

              if (result.status === 'success') {
                  $('#main-title').text(category + ' Products');
                  renderProducts(result.package.products);
              } else {
                  console.error('Server returned fail status:', result.message);
              }
          } catch (error) {
              console.error('Error sending envelope:', error);
          }
      }

      async function loadProducts() {
          try {
              const response = await fetch('/api/products');
              if (!response.ok) {
                  throw new Error(`API request failed with status ${response.status}`);
              }
              const result = await response.json();
              const products = result.products || (result.data && result.data.products);
              renderProducts(products || []);
              return;
          } catch (apiError) {
              console.warn('API load failed; falling back to local data:', apiError);
          }

          try {
              const fallbackResponse = await fetch('data/products.json');
              if (!fallbackResponse.ok) {
                  throw new Error(`Local data request failed with status ${fallbackResponse.status}`);
              }
              const products = await fallbackResponse.json();
              renderProducts(products || []);
          } catch (fallbackError) {
              console.error('Failed to load product data from API and local JSON:', fallbackError);
              $('#product-container').html('<div class="col-xs-12"><p class="alert alert-danger">Unable to load products. Start the backend server or serve the site from a local server.</p></div>');
          }
      }

      $(document).ready(function() {
          updateCartCount();
          loadProducts();
      });
    </script>
  </body>
</html>
