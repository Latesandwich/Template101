<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marazzo Shop - Product Details</title>
    <link href='https://fonts.googleapis.com/css?family=Barlow:200,300,300i,400,400i,500,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/blue.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/rateit.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="cnt-home">
    <header class="header">
        <div class="container">
            <div class="row" style="display: flex; align-items: center;">
                <div class="col-xs-6 col-sm-4 logo">
                    <a href="index.html"><img src="assets/images/logo.png" alt="logo"></a>
                </div>
                <div class="col-xs-6 col-sm-8 text-right">
                    <nav>
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="cart.html" class="nav-link">
                            <i class="fa fa-shopping-cart"></i> Cart
                            <span id="cart-count" class="cart-count-badge">0</span>
                        </a>
                        <a href="login.html" class="nav-link">Login</a>
                        <a href="register.html" class="nav-link">Register</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="body-content">
        <div class="container">
            <div id="product-detail-content" class="row product-detail-container">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>

    <div id="cart-toast">Item added to cart!</div>

    <script src="assets/js/jquery-1.11.1.min.js"></script>
    <script src="assets/js/jquery.rateit.min.js"></script>
    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.length;
            const badge = $('#cart-count');
            if (count > 0) {
                badge.text(count).show();
            } else {
                badge.hide();
            }
        }

        function showToast(message) {
            const toast = $('#cart-toast');
            toast.text(message);
            toast.addClass('show');
            setTimeout(() => {
                toast.removeClass('show');
            }, 3000);
        }

        function addToCart(product, quantity) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(item => item.id === product.id);
            quantity = parseInt(quantity);
            if (existing) {
                existing.quantity += quantity;
            } else {
                product.quantity = quantity;
                cart.push(product);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(product.name + ' added to cart!');
        }

        $(document).ready(function() {
            updateCartCount();
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            $.getJSON('/api/products', function(response) {
                const products = response.products || (response.data && response.data.products);
                const product = products.find(p => p.id === productId);
                if (product) {
                    const detailHtml = `
                        <div class="col-md-6 detail-image">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="col-md-6 detail-info">
                            <h1>${product.name}</h1>
                            <div class="rating">
                                <div class="rateit" data-rateit-value="${product.rating}" data-rateit-ispreset="true" data-rateit-readonly="true"></div>
                            </div>
                            <div class="detail-price">${product.price}</div>
                            <p class="detail-description">${product.description}</p>
                            <div class="quantity-container m-t-20">
                                <label>Quantity:</label>
                                <input type="number" id="qty-input" class="form-control" value="1" min="1" style="width: 80px; display: inline-block; margin-left: 10px;">
                            </div>
                            <div class="m-t-20">
                                <button class="btn btn-primary btn-lg" type="button" id="add-to-cart-btn"><i class="fa fa-shopping-cart"></i> Add to Cart</button>
                            </div>
                        </div>
                    `;
                    $('#product-detail-content').html(detailHtml);
                    $('.rateit').rateit();

                    $('#add-to-cart-btn').on('click', function() {
                        const qty = $('#qty-input').val();
                        addToCart(product, qty);
                    });
                } else {
                    $('#product-detail-content').html('<div class="col-xs-12"><p class="alert alert-danger">Product not found.</p></div>');
                }
            });
        });
    </script>
</body>
</html>
